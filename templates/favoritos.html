<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Favoritos - Conecta Bairro</title>

  <style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url("../static/fundo.png");
    background-size: cover;
    min-height: 100vh;
    padding-bottom: 90px;
}

/* CABEÇALHO */
header {
    background: #d482df;
    color: white;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* CARDS */
.services {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 10px 20px 20px;
}

.card {
    width: 250px;
    background: #d482df;
    border-radius: 15px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
}

.card h3 {
    color: #7a0e88;
    margin-bottom: 10px;
}

.card p {
    margin: 8px 0;
}

/* FAVORITO */
.fav {
    position: absolute;
    top: 10px;
    right: 15px;
    color: gold;
    font-size: 22px;
    cursor: pointer;
    z-index: 2;
}

/* MENU INFERIOR */
.bottom-menu {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 65px;
    background: #d482df;
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 1000;
}

.menu-btn {
    color: white;
    text-decoration: none;
    font-size: 14px;
}

.ativo {
    font-weight: bold;
}

/* MENSAGEM QUANDO NÃO HÁ FAVORITOS */
.empty {
    text-align: center;
    margin-top: 50px;
    color: #7a0e88;
    font-size: 18px;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    z-index: 2000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,.4);
}

.modal-conteudo {
    background: white;
    margin: 15% auto;
    padding: 20px;
    border-radius: 12px;
    width: 300px;
    text-align: center;
}

.btn {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin: 0 5px;
}

.btn-sim {
    background: #d482df;
    color: white;
}

.btn-nao {
    background: #ccc;
}

/* BOTÃO MAPA */
.mapa-card {
    display: block;

    width: 35px;
    height: 35px;

    margin-top: 10px;
    margin-left: auto;

    background-image: url("/static/mapa0.png");
    background-repeat: no-repeat;
    background-position: center;
    background-size: contain;

    text-decoration: none;
}
  </style>
</head>

<body>
  <body>

<header>Favoritos</header>

<div class="services" id="listaFavoritos"></div>

<div class="empty" id="vazio">
    Nenhum serviço favoritado ainda ⭐
</div>

<!-- MODAL -->
<div id="modalConfirmacao" class="modal">
    <div class="modal-conteudo">
        <p>Tem certeza que deseja remover dos favoritos?</p>

        <button class="btn btn-sim" id="btnSim">
            Sim, remover
        </button>

        <button class="btn btn-nao" id="btnNao">
            Cancelar
        </button>
    </div>
</div>

<!-- MENU -->
<div class="bottom-menu">
    <a href="/home" class="menu-btn">Início</a>
    <a href="/favoritos" class="menu-btn ativo">Favoritos</a>
    <a href="/config" class="menu-btn">Config</a>

    {% if sexo_usuario == 'feminino' or sexo_usuario == 'Feminino' %}
    <a href="/espaco_feminino" class="menu-btn">
        Espaço Feminino
    </a>
    {% endif %}
</div>

<script>

let favoritos =
JSON.parse(localStorage.getItem("favoritos")) || [];

let idParaRemover = null;

const lista = document.getElementById("listaFavoritos");
const vazio = document.getElementById("vazio");

const modal = document.getElementById("modalConfirmacao");
const btnSim = document.getElementById("btnSim");
const btnNao = document.getElementById("btnNao");


function carregarFavoritos(){

    lista.innerHTML = "";

    if(favoritos.length === 0){

        vazio.style.display = "block";
        return;

    }

    vazio.style.display = "none";

    favoritos.forEach(servico => {

        lista.innerHTML += `

        <div class="card" data-id="${servico.id}">

            <div class="fav"
                 onclick="abrirConfirmacao('${servico.id}')">
                 ⭐
            </div>

            ${
                servico.img
                ? `<img src="${servico.img}">`
                : ''
            }

            <div class="card-content">

                <h3>${servico.nome}</h3>

                <p>${servico.descricao || ''}</p>

                ${
                    servico.telefone
                    ? `<p>${servico.telefone}</p>`
                    : ''
                }

                ${
                    servico.instagram
                    ? `<p>${servico.instagram}</p>`
                    : ''
                }

                ${
                    servico.domicilio
                    ? `<p>🚗 Atendimento a domicílio</p>`
                    : ''
                }

                ${
                    servico.endereco
                    ? `
                    <a href="${servico.endereco}"
                       target="_blank"
                       class="mapa-card">
                    </a>
                    `
                    : ''
                }

            </div>

        </div>

        `;
    });
}


function abrirConfirmacao(id){

    idParaRemover = id;

    modal.style.display = "block";
}


btnNao.onclick = function(){

    modal.style.display = "none";

    idParaRemover = null;
}


btnSim.onclick = function(){

    favoritos =
    favoritos.filter(f => f.id != idParaRemover);

    localStorage.setItem(
        "favoritos",
        JSON.stringify(favoritos)
    );

    modal.style.display = "none";

    carregarFavoritos();
}


carregarFavoritos();

</script>

</body>
</html>
